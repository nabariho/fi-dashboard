<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a73e8">
  <title>FI Dashboard — Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body class="admin-body">

  <!-- Unlock screen -->
  <div id="unlock">
    <h1>FI Dashboard — Admin</h1>
    <div class="unlock-form">
      <div class="file-picker" id="filePicker">
        <div class="file-picker-icon" id="filePickerIcon">&#128194;</div>
        <div class="file-picker-text">
          <div class="file-picker-label" id="filePickerLabel">Choose a data file</div>
          <div class="file-picker-hint" id="filePickerHint">.fjson or .json data file</div>
        </div>
      </div>
      <div class="unlock-step disabled" id="passphraseStep">
        <input type="password" id="passphrase" placeholder="Enter passphrase">
        <button id="decryptBtn">Decrypt & Load</button>
      </div>
      <div id="unlockError"></div>
    </div>
  </div>

  <!-- Admin editor (hidden until loaded) -->
  <div id="adminApp" style="display:none;">

    <div class="admin-header">
      <h1>FI Dashboard — Admin</h1>
      <div class="header-links">
        <a href="index.html">Back to Dashboard</a>
      </div>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="config">Config <span class="tab-badge" id="badge-config">0</span></button>
      <button class="admin-tab" data-tab="accounts">Accounts <span class="tab-badge" id="badge-accounts">0</span></button>
      <button class="admin-tab" data-tab="budget">Budget <span class="tab-badge" id="badge-budget">0</span></button>
      <button class="admin-tab" data-tab="monthend">MonthEnd <span class="tab-badge" id="badge-monthend">0</span></button>
    </div>

    <!-- Config -->
    <div class="admin-content active" id="admin-config">
      <div id="configTable"></div>
    </div>

    <!-- Accounts -->
    <div class="admin-content" id="admin-accounts">
      <div id="accountsTable"></div>
    </div>

    <!-- Budget -->
    <div class="admin-content" id="admin-budget">
      <div id="budgetTable"></div>
    </div>

    <!-- MonthEnd -->
    <div class="admin-content" id="admin-monthend">
      <div id="monthendContent"></div>
    </div>

    <!-- Save bar -->
    <div class="save-bar">
      <div class="dirty-indicator">
        <div class="dirty-dot"></div>
        Unsaved changes
      </div>
      <span class="kbd" style="color:var(--text-secondary)">Ctrl+S</span>
      <button class="btn-save" id="saveBtn">Save</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </div>

  <script src="js/crypto.js"></script>
  <script src="js/file-manager.js"></script>
  <script src="js/data-cache.js"></script>
  <script src="js/admin.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
